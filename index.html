<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pin Blaster: Neon Grand Slam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

:root {
    --neon-cyan: #00f2ff;
    --neon-pink: #ff00bd;
    --neon-purple: #bc13fe; 
    --neon-yellow: #fff200;
    --neon-blue: #0077ff;
}

*{box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; user-select:none;}

body {
    font-family: 'Fredoka One', cursive;
    background: #020205; color: white;
    width: 100vw; height: 100vh;
    overflow: hidden; display: flex;
}

/* ═══ LOBBY ═══ */
#lobby {
    position: fixed; inset: 0; background: radial-gradient(circle, #1a0033, #000);
    z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.lobby-card {
    background: rgba(0,0,0,0.95); border: 5px solid var(--neon-cyan); border-radius: 40px;
    padding: 50px; text-align: center; box-shadow: 0 0 60px var(--neon-cyan);
}
.option-btn {
    background: #111; border: 3px solid var(--neon-purple); color: white;
    padding: 14px 28px; margin: 8px; border-radius: 20px; cursor: pointer; font-family: 'Fredoka One';
}
.option-btn.active { background: var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple); transform: scale(1.05); }

/* ═══ SIDEBAR ═══ */
#sidebar {
    width: 340px; background: #050510; border-right: 4px solid var(--neon-purple);
    display: flex; flex-direction: column; padding: 25px; z-index: 100;
}
#question-zone { flex: 1; display: flex; flex-direction: column; opacity: 0; }
.jazzy-box { 
    background: rgba(0, 242, 255, 0.1); border: 3px solid var(--neon-cyan); 
    border-radius: 25px; padding: 20px; text-align: center; min-height: 160px;
    display: flex; flex-direction: column; justify-content: center;
    box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.2);
}
#answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }

.ans-btn {
    width: 95px; height: 95px; justify-self: center;
    background: radial-gradient(circle at 35% 35%, #666, #111 75%);
    border: 4px solid var(--neon-purple); border-radius: 50%;
    color: white; font-size: 2.5rem; cursor: pointer; font-family: 'Fredoka One';
    box-shadow: 0 10px 20px rgba(0,0,0,0.8);
}

/* ═══ STAGE ═══ */
#stage { flex: 1; position: relative; background: #000; overflow: hidden; z-index: 10; }

#lane-wrapper {
    position: absolute; bottom: -50px; left: 50%; width: 120%; height: 95%;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 15px var(--neon-purple)) drop-shadow(0 0 30px var(--neon-purple));
    mask-image: linear-gradient(to top, black 90%, transparent 100%);
}

#lane-container {
    width: 100%; height: 100%;
    clip-path: polygon(42% 0%, 58% 0%, 100% 100%, 0% 100%);
    background: #050510;
    border-left: 25px solid var(--neon-purple);
    border-right: 25px solid var(--neon-purple);
    position: relative;
    box-shadow: inset 0 0 80px rgba(0, 242, 255, 0.3);
}

/* ═══ PERSPECTIVE LINES: Converging beyond the top ═══ */
#lane-container::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    /* Vanishing point set above the lane (-20%) to match bumper slope */
    background: 
        conic-gradient(from 179.8deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.4deg),
        conic-gradient(from 185deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.2deg),
        conic-gradient(from 195deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.2deg),
        conic-gradient(from 205deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.2deg),
        conic-gradient(from 175deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.2deg),
        conic-gradient(from 165deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.2deg),
        conic-gradient(from 155deg at 50% -20%, transparent 0deg, var(--neon-blue) 0.1deg, transparent 0.2deg);
    mask-image: linear-gradient(to top, black 85%, transparent 100%);
    filter: drop-shadow(0 0 5px var(--neon-blue));
}

#pins-rack { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 350px; height: 300px; }
.pin { position: absolute; filter: drop-shadow(0 15px 10px rgba(0,0,0,0.9)); transform-origin: bottom center; }
#ball { position: absolute; bottom: -40px; left: 50%; width: 450px; height: 450px; transform: translateX(-50%); z-index: 300; cursor: pointer; }

/* NEON SUCCESS POPUP */
#feedback-container {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
    z-index: 1000; background: #fff; border: 12px solid #000;
    padding: 40px; min-width: 480px; text-align: center; cursor: pointer;
    box-shadow: 0 0 80px var(--neon-cyan), inset 0 0 30px var(--neon-cyan);
    clip-path: polygon(0% 15%, 5% 0%, 95% 0%, 100% 15%, 100% 85%, 95% 100%, 5% 100%, 0% 85%);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    opacity: 0;
}
#feedback-text { font-size: 4.5rem; color: #000; text-transform: uppercase; }
#equation-text { font-size: 3.5rem; color: var(--neon-purple); }

/* VICTORY OVERLAY */
#victory-screen {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000;
    display: none; align-items: center; justify-content: center; perspective: 1200px;
}
.victory-card {
    background: white; border: 15px solid var(--neon-yellow); padding: 60px; border-radius: 50px;
    text-align: center; color: black; box-shadow: 0 0 120px var(--neon-yellow);
    z-index: 4010; position: relative;
}
.victory-pin { position: absolute; width: 140px; z-index: 4005; pointer-events: none; }
</style>
</head>
<body>

<div id="lobby">
    <div class="lobby-card">
        <h1 style="color:var(--neon-cyan); font-size: 4rem; text-shadow: 0 0 20px var(--neon-cyan);">NEON ALLEY</h1>
        <div class="option-group">
            <p style="color:var(--neon-pink); margin-bottom:10px;">MODE</p>
            <button class="option-btn active" onclick="setMode('left', this)">HOW MANY LEFT?</button>
            <button class="option-btn" onclick="setMode('hit', this)">HOW MANY HIT?</button>
        </div>
        <div class="option-group" style="margin-top:20px;">
            <p style="color:var(--neon-pink); margin-bottom:10px;">ROUNDS</p>
            <button class="option-btn" onclick="setRounds(5, this)">5</button>
            <button class="option-btn active" onclick="setRounds(10, this)">10</button>
            <button class="option-btn" onclick="setRounds(15, this)">15</button>
        </div>
        <button class="ans-btn" style="width:260px; border-radius:30px; border-color:white; margin-top: 30px;" onclick="startGame()">PLAY!</button>
    </div>
</div>

<div id="sidebar">
    <div style="text-align: center; margin-bottom: 20px;"><h1 style="color:var(--neon-cyan); font-size: 2rem;">PIN BLASTER</h1></div>
    <div id="question-zone">
        <div class="jazzy-box"><h2 id="q-main">Tap Ball!</h2></div>
        <div id="answer-grid"></div>
        <button class="option-btn" style="width:100%; border-color:white;" onclick="replayAudio()">🔊 REPLAY VOICE</button>
        <div style="margin-top:auto; text-align:center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;">
            <h2 style="color:var(--neon-cyan)">SCORE: <span id="score-val">0</span></h2>
            <p style="color:var(--neon-pink)">ROUND <span id="round-val">1</span> / <span id="total-val">10</span></p>
        </div>
    </div>
</div>

<div id="stage">
    <div id="lane-wrapper">
        <div id="lane-container"></div>
    </div>
    <div id="pins-rack"></div>
    <img id="ball" onclick="rollBall()" src="https://raw.githubusercontent.com/gurumel80/Bowling/main/ball.png">
    <div id="feedback-container" onclick="closeFeedback()">
        <div id="feedback-text">STRIKE!</div>
        <div id="equation-text"></div>
        <p style="font-size: 1rem; color: #666; margin-top: 15px;">TAP TO CONTINUE</p>
    </div>
</div>

<div id="victory-screen">
    <div class="victory-card" id="vic-card">
        <h1 style="font-size: 5rem; text-transform: uppercase;">YOU WIN!</h1>
        <h2 style="font-size: 3rem; margin: 20px 0;">FINAL SCORE: <span id="vic-score">0</span></h2>
        <button class="ans-btn" style="width:100%; border-radius:30px; color:white; font-size: 2.5rem;" onclick="location.reload()">PLAY AGAIN</button>
        </div>
</div>

<script>
const PIN_IMG = 'https://raw.githubusercontent.com/gurumel80/Bowling/main/pin.png';
let game = { score: 0, current: 1, total: 10, mode: 'left', knocked: 0, lastText: "", rolling: false };
let audioCtx;

function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playClatter(intensity = 1.0) {
    if(!audioCtx) return;
    for(let i=0; i<4; i++) {
        setTimeout(() => {
            const dur = 0.4 + Math.random()*0.2;
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let j=0; j<data.length; j++) data[j] = (Math.random() * 2 - 1) * 0.4;
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const low = audioCtx.createBiquadFilter();
            low.type = 'lowpass'; low.frequency.setValueAtTime(600, audioCtx.currentTime);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(intensity, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            src.connect(low); low.connect(g); g.connect(audioCtx.destination);
            src.start();
        }, i * 60);
    }
}

function playFanfare() {
    if(!audioCtx) return;
    const notes = [349.23, 440, 523.25, 698.46, 880];
    notes.forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.08));
        g.gain.setValueAtTime(0.15, audioCtx.currentTime + (i * 0.08));
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + (i * 0.08));
        osc.stop(audioCtx.currentTime + 1.2);
    });
}

function speak(text) {
    game.lastText = text;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.speak(msg);
}

function replayAudio() { speak(game.lastText); }

function setMode(m, btn) {
    game.mode = m;
    btn.parentNode.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function setRounds(r, btn) {
    game.total = r;
    btn.parentNode.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function startGame() {
    initAudio();
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('question-zone').style.opacity = '1';
    document.getElementById('total-val').innerText = game.total;
    setupPins();
}

function setupPins() {
    const rack = document.getElementById('pins-rack');
    rack.innerHTML = '';
    const layout = [1, 2, 3, 4];
    let id = 0;
    layout.forEach((count, rowIdx) => {
        for(let i=0; i<count; i++) {
            const img = document.createElement('img');
            img.src = PIN_IMG; img.className = 'pin';
            img.id = `pin-${id++}`;
            const scale = 1.3 - (rowIdx * 0.12);
            img.style.width = (90 * scale) + "px";
            img.style.left = `calc(50% + ${(i - (count-1)/2)*55}px - ${(90*scale)/2}px)`;
            img.style.top = `${210 - (rowIdx * 35)}px`;
            img.style.zIndex = 150 - rowIdx; 
            rack.appendChild(img);
        }
    });
}

function rollBall() {
    if(game.rolling) return;
    game.rolling = true;
    game.knocked = Math.floor(Math.random() * 11);
    const ball = document.getElementById('ball');
    ball.style.transition = 'bottom 1.6s cubic-bezier(.4,0,.6,1), width 1.6s, height 1.6s, opacity 0.2s 1.5s';
    ball.style.bottom = '80%'; ball.style.width = '30px'; ball.style.height = '30px'; ball.style.opacity = '0';
    setTimeout(handleCollision, 1600);
}

function handleCollision() {
    playClatter(1.2);
    const toFly = Array.from({length:10}, (_,i)=>i).sort(()=>0.5-Math.random()).slice(0, game.knocked);
    toFly.forEach(id => {
        const p = document.getElementById(`pin-${id}`);
        if(p) p.animate([{ transform: 'translate(0,0)', opacity: 1 },{ transform: `translate(${(Math.random()-0.5)*1500}px, -900px) rotate(${Math.random()*1500}deg)`, opacity: 0 }], { duration: 1500, fill: 'forwards' });
    });
    setTimeout(askQuestion, 1000);
}

function askQuestion() {
    const standing = 10 - game.knocked;
    let correctAns = game.mode === 'left' ? standing : game.knocked;
    let qText = game.mode === 'left' ? `${game.knocked} pins were knocked down. How many are left?` : `${standing} pins are left. How many went down?`;
    
    document.getElementById('q-main').innerText = qText;
    speak(qText);
    
    const grid = document.getElementById('answer-grid');
    grid.innerHTML = '';
    let opts = new Set([correctAns]);
    while(opts.size < 4) opts.add(Math.floor(Math.random()*11));
    Array.from(opts).sort((a,b)=>a-b).forEach(val => {
        const b = document.createElement('button');
        b.className = 'ans-btn'; b.innerText = val;
        b.onclick = () => {
            if(val === correctAns) {
                game.score++;
                document.getElementById('score-val').innerText = game.score;
                showSuccess(standing, game.knocked);
            } else {
                b.style.opacity = "0.2";
                speak("Try again!");
            }
        };
        grid.appendChild(b);
    });
}

function showSuccess(left, hit) {
    const fb = document.getElementById('feedback-container');
    const praises = ["BOOM!", "STRIKE!", "AWESOME!", "NAILED IT!", "MEGA!", "YES!", "GREAT!"];
    const txt = praises[Math.floor(Math.random()*praises.length)];
    
    document.getElementById('feedback-text').innerText = txt;
    document.getElementById('equation-text').innerText = `${hit} + ${left} = 10`;
    speak(`${txt}. ${hit} and ${left} makes 10!`);

    fb.style.opacity = "1";
    fb.style.transform = "translate(-50%, -50%) scale(1)";
}

function closeFeedback() {
    const fb = document.getElementById('feedback-container');
    fb.style.opacity = "0";
    fb.style.transform = "translate(-50%, -50%) scale(1.5)";
    
    setTimeout(() => {
        fb.style.transform = "translate(-50%, -50%) scale(0)";
        if(game.current >= game.total) triggerVictory();
        else { game.current++; document.getElementById('round-val').innerText = game.current; resetStage(); }
    }, 300);
}

function triggerVictory() {
    const screen = document.getElementById('victory-screen');
    const card = document.getElementById('vic-card');
    document.getElementById('vic-score').innerText = `${game.score} / ${game.total}`;
    
    screen.style.display = 'flex';
    playClatter(2.0);
    playFanfare();

    for(let i=0; i<15; i++) {
        const p = document.createElement('img');
        p.src = PIN_IMG; p.className = 'victory-pin';
        p.style.left = '50%'; p.style.top = '50%';
        screen.appendChild(p);
        p.animate([
            { transform: 'translate(-50%, -50%) scale(0) rotate(0)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*2400}px, ${(Math.random()-0.5)*2400}px) scale(2.5) rotate(${Math.random()*1500}deg)`, opacity: 0 }
        ], { duration: 2000, easing: 'ease-out' });
    }

    card.animate([
        { transform: 'scale(0) rotate(-30deg)', opacity: 0 },
        { transform: 'scale(1.2) rotate(10deg)', opacity: 1, offset: 0.7 },
        { transform: 'scale(1) rotate(0)', opacity: 1 }
    ], { duration: 800, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)' });
}

function resetStage() {
    game.rolling = false;
    const ball = document.getElementById('ball');
    ball.style.transition = 'none'; ball.style.bottom = '-40px'; ball.style.width = '450px'; ball.style.height = '450px'; ball.style.opacity = '1';
    setupPins();
}
</script>
</body>
</html>
